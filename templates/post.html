<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{postTitle}} - Tony Pai's Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="/static/css/shared.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* Post Template Specific Styles */
        .container {
            position: relative;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        /* Table of Contents Sidebar */
        .hamburger {
            position: fixed;
            width: 44px;
            height: 44px;
            bottom: 1rem;
            left: 1rem;
            z-index: 1001;
            background: #21262d;
            border: none;
            color: #e1e1e1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transform: translateY(0);
        }
        
        .hamburger:hover {
            background: #30363d;
            transform: translateY(-1px);
        }
        
        .hamburger.hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: #161b22;
            border-right: 1px solid #21262d;
            z-index: 1000;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .sidebar.open {
            left: 0;
        }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar-header {
            padding: 1rem 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 1rem;
        }
        
        .sidebar-title {
            color: #f0f6fc;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .toc {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .toc li {
            margin: 0;
        }
        
        .toc a {
            display: block;
            color: #c9d1d9;
            text-decoration: none;
            padding: 0.5rem 0;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .toc a:hover {
            color: #58a6ff;
            background: #0d1117;
            padding-left: 0.5rem;
        }
        
        .toc a.active {
            color: #58a6ff;
            background: #0d1117;
            padding-left: 0.5rem;
        }
        
        .toc .h1 { padding-left: 0; font-weight: 600; }
        .toc .h2 { padding-left: 1rem; }
        .toc .h3 { padding-left: 2rem; }
        .toc .h4 { padding-left: 3rem; }
        .toc .h5 { padding-left: 4rem; }
        .toc .h6 { padding-left: 5rem; }

        /* Mobile styles */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .post-content h1 {
                font-size: 1.6rem;
            }
            
            .post-content h2 {
                font-size: 1.4rem;
            }
            
            .header-row {
                flex-direction: row;
                flex-wrap: nowrap;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .post-meta span {
                display: block;
                margin-bottom: 0.25rem;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
        ☰
    </button>
    
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title">Table of Contents</h3>
        </div>
        <ul class="toc" id="tableOfContents">
            <!-- Table of contents will be generated here -->
        </ul>
    </div>
    
    <div class="container">
        <div class="header-row">
            <nav class="nav">
                <a href="#" onclick="javascript:history.back()">←</a>
            </nav>
            
            <div class="post-meta">
                <span>{{createdDate}}</span>
                <span class="filename">{{filename}}</span>
            </div>
        </div>
        
        <article>
            <div class="post-content">
                {{postContent}}
            </div>
        </article>
        
        <nav class="nav">
            <a href="#" onclick="javascript:history.back()">←</a>
        </nav>
    </div>
    
    <script>
        window.TEMPLATE_DATA = {
            searchQuery: "{{searchQuery}}"
        };
    </script>
    <script src="/static/js/search-bar.js"></script>
    <script src="/static/js/post.js"></script>
</body>
</html>
